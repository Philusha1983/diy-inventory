name: 💡 Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great! Please describe it clearly so it can be evaluated.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain point or missing capability
      placeholder: "I'm always frustrated when I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area of the app?
      options:
        - Dashboard / Inventory Table
        - Add / Edit Component
        - Bulk Import (CSV / ZIP / Wizard)
        - Location Manager & QR Labels
        - Creative Engine (Projects)
        - Lab Assistant (Chat)
        - AI Settings
        - Deployment / Infrastructure
        - Other
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      description: Your best guess
      options:
        - Small (few lines of code)
        - Medium (new page or significant logic)
        - Large (new subsystem or DB changes)
        - Not sure

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, links, examples from other tools, etc.
