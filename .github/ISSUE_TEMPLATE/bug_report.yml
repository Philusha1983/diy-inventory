name: 🐛 Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: e.g. 8.2.10
    validations:
      required: true

  - type: input
    id: mysql-version
    attributes:
      label: MySQL / MariaDB Version
      placeholder: e.g. MySQL 8.0.33
    validations:
      required: true

  - type: dropdown
    id: server
    attributes:
      label: Server Environment
      options:
        - PHP built-in server (php -S)
        - MAMP
        - XAMPP
        - Apache (Linux/production)
        - Other
    validations:
      required: true

  - type: dropdown
    id: ai-provider
    attributes:
      label: AI Provider in Use
      options:
        - Google Gemini
        - OpenAI GPT-4o
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect to happen?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste any PHP errors from the terminal or browser console
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, inventory size, browser version, etc.
